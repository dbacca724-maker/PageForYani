<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Final 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background: linear-gradient(135deg,#ffafcc,#c77dff);
    color:white;
}

/* corazones juego */
.heart{
    position:absolute;
    font-size:40px;
    cursor:pointer;
    animation: move 6s linear infinite;
}

@keyframes move{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* FINAL */
#final{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* corazón grande */
#bigHeart{
    font-size:150px;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* carta */
#texto{
    margin-top:20px;
    max-width:400px;
    font-size:20px;
}

/* botones final */
.opciones{
    margin-top:20px;
    display:none;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#c77dff;
    color:white;
}

/* efectos */
.fall{
    position:absolute;
    font-size:25px;
    animation: fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h2>Encuentra el corazón correcto 💖</h2>


<div id="game"></div>

<div id="final">
    <div id="bigHeart">💖</div>
    <div id="texto"></div>

    <div class="opciones" id="opciones">
        <button onclick="respuesta()">💖 Sí</button>
        <button onclick="respuesta()">💜 Shi</button>
    </div>
</div>

<script>
let correct = Math.floor(Math.random()*10);

/* crear corazones */
for(let i=0;i<10;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML=["💖","💜","💗"][Math.floor(Math.random()*3)];
    h.style.left=Math.random()*90+"vw";

    h.onclick=()=>{
        if(i===correct){
            iniciarFinal();
        }else{
            h.style.opacity=0.3;
        }
    };

    document.body.appendChild(h);
}

/* FINAL */
function iniciarFinal(){
    document.querySelectorAll(".heart").forEach(e=>e.remove());
    document.getElementById("final").style.display="flex";

    escribir();
    efectos();
}

/* texto letra por letra */
let mensaje=`Yanira...

No sé cómo explicarlo,
pero desde que llegaste...

todo cambió 💜

Me haces feliz,
me haces pensar en ti...

y solo quiero seguir compartiendo momentos contigo 💖`;

function escribir(){
    let i=0;
    let t=document.getElementById("texto");

    function efecto(){
        if(i<mensaje.length){
            t.innerHTML+=mensaje.charAt(i);
            i++;
            setTimeout(efecto,40);
        }else{
            document.getElementById("opciones").style.display="block";
        }
    }
    efecto();
}

/* efectos */
function efectos(){
    setInterval(()=>{
        let e=document.createElement("div");
        e.className="fall";
        e.innerHTML=["🌸","💖","✨"][Math.floor(Math.random()*3)];
        e.style.left=Math.random()*100+"vw";
        e.style.animationDuration=(3+Math.random()*4)+"s";
        document.body.appendChild(e);
        setTimeout(()=>e.remove(),5000);
    },300);
}

/* respuesta final */
function respuesta(){
    document.getElementById("texto").innerHTML=`
💖 Sabía que dirías que sí 💖

Prometo hacerte sonreír,
estar para ti
y crear momentos lindos contigo ✨
`;
    document.getElementById("opciones").style.display="none";
}
</script>

</body>
</html>
