<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenida Yanira</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* contenedor */
.container {
    display: none;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 90%;
    max-width: 420px;
    color: #7b2cbf;
}

/* título */
h1 {
    font-family: 'Pacifico', cursive;
    font-size: 45px;
    color: white;
    text-shadow: 0 0 20px #c77dff, 0 0 40px #e0aaff;
}

/* BOTONES */
.juegos {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.boton-juego {
    padding: 15px;
    border-radius: 15px;
    background: linear-gradient(135deg, #e0aaff, #cdb4db);
    color: #5a189a;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.boton-juego:hover {
    transform: scale(1.05);
}

/* acceso */
#acceso {
    text-align: center;
    color: #7b2cbf;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-top: 10px;
    text-align: center;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #c77dff;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

/* mensaje */
#mensaje {
    margin-top: 20px;
    white-space: pre-line;
    font-size: 18px;
}

/* corazones */
.corazon {
    position: absolute;
    font-size: 50px;
    cursor: pointer;
    animation: subir 8s linear forwards;
}

@keyframes subir {
    from {transform: translateY(0);}
    to {transform: translateY(-120vh);}
}

/* popup */
.popup {
    position: absolute;
    background: white;
    color: #7b2cbf;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 14px;
    animation: fade 2s forwards;
}

@keyframes fade {
    100% {opacity: 0; transform: translateY(-20px);}
}
</style>
</head>

<body>

<!-- ACCESO -->
<div id="acceso">
    <h2>🔐 Acceso privado</h2>
    <p>Para acceder a mis sentimientos ingresa la contraseña 💜</p>
    <input type="password" id="clave" placeholder="Clave secreta">
    <br>
    <button onclick="verificar()">Entrar</button>
</div>

<!-- CONTENIDO -->
<div class="container" id="contenido">
    <h1>Bienvenida Yanira 💜</h1>
    <button onclick="iniciar()">Descubrir</button>

    <div id="mensaje"></div>

    <!-- BOTONES -->
    <div class="juegos">
       
        <div class="boton-juego" onclick="window.location.href='juego1.html'">
            Juego 1 💜
        </div>

       <div class="boton-juego" onclick="window.location.href='juego2.html'">
        Juego 2 🐞
    </div>
<div class="boton-juego" onclick="window.location.href='juego3.html'">
    Juego 3 💖
</div>

<div class="boton-juego" onclick="window.location.href='juego4.html'">
    Juego 4 💖
</div>
    </div>
</div>

<audio id="popSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

<script>
function verificar() {
    let clave = document.getElementById("clave").value;

    if (clave === "44") {
        document.getElementById("acceso").style.display = "none";
        document.getElementById("contenido").style.display = "block";
    } else {
        alert("Clave incorrecta 😢");
    }
}

function escribir(texto, velocidad=40) {
    let i = 0;
    let cont = document.getElementById("mensaje");
    cont.innerHTML = "";

    function efecto() {
        if (i < texto.length) {
            cont.innerHTML += texto.charAt(i);
            i++;
            setTimeout(efecto, velocidad);
        }
    }
    efecto();
}

const mensajes = [
    "Me gusta tu sonrisa 😊",
    "Me encanta hablar contigo 💬",
    "Tienes algo especial ✨",
    "Siempre me haces pensar en ti 💖",
    "Eres diferente 💫",
    "Me gusta tu forma de ser 🫶"
];

function crearCorazones() {
    setInterval(() => {
        let corazon = document.createElement("div");
        corazon.classList.add("corazon");
        corazon.innerHTML = "💖";

        corazon.style.left = Math.random() * 90 + "vw";
        corazon.style.top = "100vh";

        corazon.onclick = function() {
            document.getElementById("popSound").play();
            mostrarMensaje(corazon);
            corazon.remove();
        };

        document.body.appendChild(corazon);

        setTimeout(() => corazon.remove(), 8000);
    }, 700);
}

function mostrarMensaje(corazon) {
    let popup = document.createElement("div");
    popup.classList.add("popup");

    let mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];
    popup.innerHTML = mensaje;

    popup.style.left = corazon.style.left;
    popup.style.top = "60%";

    document.body.appendChild(popup);

    setTimeout(() => popup.remove(), 2000);
}

function iniciar() {
    crearCorazones();

    let texto = 
`Yanira...

No sé en qué momento pasó...
pero te volviste alguien muy importante para mí  

Me gusta hablar contigo,
pensarte...

Solo quería que lo supieras...`;

    escribir(texto);
}
</script>

</body>
</html>
