<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>juego 3 </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    font-family:'Poppins', sans-serif;
    color:white;

    background-image:url("https://img.freepik.com/vector-gratis/oso-lindo-ilustracion-icono-vector-dibujos-animados-corazon-amor-concepto-icono-naturaleza-animal-aislado_138676-6408.jpg?semt=ais_incoming&w=740&q=80");
    background-size:cover;
    background-position:center;
}

/* 🔙 BOTÓN REGRESAR */
.btn-regresar{
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #c77dff, #ffafcc);
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    z-index: 999;
    transition: 0.3s;
}

.btn-regresar:hover{
    transform: scale(1.1);
    box-shadow: 0 0 15px #c77dff;
}

/* TITULO */
h1{
    font-size:40px;
    text-shadow:0 0 10px #000;
}

/* CORAZÓN */
#heart{
    font-size:130px;
    cursor:pointer;
    animation:beat 1s infinite;
    filter: drop-shadow(0 0 15px #c77dff);
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

/* INFO */
#info{
    font-size:20px;
    margin-top:10px;
}

/* MENSAJE FINAL */
#msg{
    display:none;
    margin-top:20px;
}

/* 💖 TEXTO GANADOR */
#msg h2{
    font-family:'Dancing Script', cursive;
    font-size:50px;
    animation: blinkGlow 1.2s infinite;
}

/* 🌈 ANIMACIÓN */
@keyframes blinkGlow{
    0%{color:#ffffff; text-shadow:0 0 10px #c77dff, 0 0 20px #ffafcc;}
    25%{color:#ffafcc;}
    50%{color:#c77dff;}
    75%{color:#bde0fe;}
    100%{color:#ffffff;}
}

#msg p{
    font-size:18px;
    max-width:420px;
    line-height:1.5;
}

/* BOTÓN */
#restart{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    display:none;
}

/* 🌹 ROSAS */
.rose{
    position:absolute;
    top:-10%;
    font-size:28px;
    animation: fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>


<h1>Presiona el corazon Yani <3</h1>

<p>Logra 60 clicks en 15 segundos</p>

<div id="heart" onclick="clickHeart()">💖</div>

<div id="info">
⏱️ <span id="time">15</span>s <br>
🔢 <span id="count">0</span>/60
</div>

<div id="msg"></div>

<button id="restart" onclick="location.reload()">Reiniciar</button>

<script>
let clicks=0;
let time=15;
let gameOver=false;

setInterval(()=>{
if(gameOver) return;

time--;
document.getElementById("time").innerText=time;

if(time<=0){
lose();
}
},1000);

function clickHeart(){
if(gameOver) return;

clicks++;
document.getElementById("count").innerText=clicks;

if(clicks>=60){
win();
}
}

function win(){
gameOver=true;

document.getElementById("msg").innerHTML=`
<h2>Felicidades Yani ganaste 💖</h2>
<p>
Desde que te vi, me quedé pensando en ti,<br>
y lo mucho que quiero volver a verte y hablar contigo.<br>
Eres tan especial para mi y todo lo que quiero es hacerte feliz 💜
</p>
`;

document.getElementById("msg").style.display="block";
document.getElementById("restart").style.display="inline-block";

startRoses();
}

function lose(){
gameOver=true;
document.getElementById("msg").innerHTML="<h2>💔 Intenta otra vez</h2>";
document.getElementById("msg").style.display="block";
document.getElementById("restart").style.display="inline-block";
}

/* 🌹 ROSAS */
function startRoses(){
for(let i=0;i<25;i++){
let rose=document.createElement("div");
rose.className="rose";
rose.innerHTML="🌹";
rose.style.left=Math.random()*100+"vw";
rose.style.animationDuration=(3+Math.random()*5)+"s";
rose.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(rose);
}
}
</script>

</body>
</html>
